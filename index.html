<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#b91c1c" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>Weekly Tracker</title>

  <style>
    :root {
      --bg: #020202;
      --card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.09);
      --border-red: rgba(220, 38, 38, 0.35);
      --text: #f5f5f5;
      --muted: #a1a1aa;
      --primary: #dc2626;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
      --radius-xl: 26px;
      --radius-lg: 22px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(127, 0, 0, 0.35), transparent 28%),
        radial-gradient(circle at bottom right, rgba(127, 0, 0, 0.22), transparent 26%),
        linear-gradient(180deg, #050505 0%, #020202 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 18px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent 0%, rgba(220, 38, 38, 0.04) 50%, transparent 100%);
      mix-blend-mode: screen;
      opacity: 0.7;
    }

    .app {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .top-glow {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
      height: 120px;
      background: radial-gradient(circle, rgba(220, 38, 38, 0.22) 0%, rgba(220, 38, 38, 0) 70%);
      filter: blur(18px);
      pointer-events: none;
    }

    .profile-card {
      position: relative;
      background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.025));
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 26px 22px 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
      margin-bottom: 18px;
    }

    .profile-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top center, rgba(220, 38, 38, 0.12), transparent 35%);
      pointer-events: none;
    }

    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }

    .avatar-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(220, 38, 38, 0.18), rgba(220, 38, 38, 0.02) 58%, transparent 70%);
      box-shadow:
        0 0 0 1px rgba(220, 38, 38, 0.28),
        0 0 28px rgba(220, 38, 38, 0.2);
    }

    .avatar {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: linear-gradient(180deg, #0d0d0d, #090909);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: 0.02em;
      color: #ffffff;
    }

    .profile-name {
      text-align: center;
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(220, 38, 38, 0.18);
    }

    .profile-subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.45;
      max-width: 300px;
      margin: 0 auto;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .menu-btn {
      width: 100%;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));
      color: var(--text);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition:
        transform 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        background 0.22s ease;
      text-align: left;
    }

    .menu-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(220, 38, 38, 0.34);
      box-shadow:
        0 18px 35px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(220, 38, 38, 0.1);
    }

    .menu-btn:active {
      transform: scale(0.985);
    }

    .menu-btn.primary {
      border-color: var(--border-red);
      box-shadow:
        0 18px 35px rgba(0, 0, 0, 0.48),
        0 0 0 1px rgba(220, 38, 38, 0.08),
        inset 0 0 0 1px rgba(220, 38, 38, 0.04);
    }

    .icon-box {
      min-width: 44px;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.025));
      border: 1px solid rgba(255, 255, 255, 0.07);
      font-size: 1.2rem;
    }

    .menu-content {
      flex: 1;
      min-width: 0;
    }

    .menu-title {
      font-size: 1.08rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 4px;
    }

    .menu-subtitle {
      font-size: 0.86rem;
      color: var(--muted);
      line-height: 1.3;
    }

    .arrow {
      font-size: 1.4rem;
      color: #d4d4d8;
      opacity: 0.85;
    }

    .footer-text {
      margin-top: 18px;
      text-align: center;
      color: rgba(255,255,255,0.35);
      font-size: 0.78rem;
      letter-spacing: 0.02em;
    }
  </style>
</head>

<body>
  <main class="app">
    <div class="top-glow"></div>

    <section class="profile-card">
      <div class="avatar-wrap">
        <div class="avatar-ring">
          <div class="avatar">J</div>
        </div>
      </div>

      <h1 class="profile-name">Juan Zuluaga</h1>
      <p class="profile-subtitle">
        Tu espacio personal para organizar hábitos, seguir progreso y
        mantener consistencia.
      </p>
    </section>

    <section class="menu">
      <button class="menu-btn primary" onclick="goToTracker()">
        <div class="icon-box">📋</div>
        <div class="menu-content">
          <div class="menu-title">Tracker</div>
          <div class="menu-subtitle">Crear, organizar y completar tareas</div>
        </div>
        <div class="arrow">›</div>
      </button>

      <button class="menu-btn" onclick="goToCalendar()">
        <div class="icon-box">📅</div>
        <div class="menu-content">
          <div class="menu-title">Planner semanal</div>
          <div class="menu-subtitle">Planifica tu semana y visualiza objetivos</div>
        </div>
        <div class="arrow">›</div>
      </button>

      <button class="menu-btn" onclick="showStats()">
        <div class="icon-box">📊</div>
        <div class="menu-content">
          <div class="menu-title">Estadísticas</div>
          <div class="menu-subtitle">Visualizar tu progreso semanal</div>
        </div>
        <div class="arrow">›</div>
      </button>

      <button class="menu-btn" onclick="showSettings()">
        <div class="icon-box">⚙️</div>
        <div class="menu-content">
          <div class="menu-title">Configuración</div>
          <div class="menu-subtitle">Ajustar preferencias de la app</div>
        </div>
        <div class="arrow">›</div>
      </button>
    </section>

    <div class="footer-text">Weekly Tracker</div>
  </main>

  <script>
    function goToTracker() {
      window.location.href = "tracker.html";
    }

    function goToCalendar() {
      window.location.href = "calendar.html";
    }

    function showStats() {
      window.location.href = "statistics.html";
    }

    function showSettings() {
      window.location.href = "settings.html";
    }
  </script>
</body>
</html>
