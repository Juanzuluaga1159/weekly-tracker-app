<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Menú Principal</title>

<style>
:root{
--bg:linear-gradient(160deg,#0f172a,#1e293b);
--card:rgba(255,255,255,0.08);
--border:rgba(255,255,255,0.15);
--text:#f1f5f9;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
padding-top:calc(20px + env(safe-area-inset-top));
padding-bottom:calc(20px + env(safe-area-inset-bottom));
}

.container{
width:100%;
max-width:420px;
margin:0 auto;
padding:0 20px; /* 👈 margen lateral fijo real */
text-align:center;
}

.profile-img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin:0 auto 16px auto;
border:3px solid rgba(255,255,255,.2);
}

h2{
font-weight:500;
margin-bottom:40px;
font-size:clamp(18px,4vw,22px);
}

.menu-btn{
width:100%;
padding:18px;
margin-bottom:18px;
border:none;
border-radius:16px;
background:var(--card);
border:1px solid var(--border);
color:white;
font-size:clamp(15px,4vw,17px);
cursor:pointer;
transition:.2s;
backdrop-filter:blur(10px);
}

.menu-btn:hover{
background:rgba(255,255,255,0.15);
}

.menu-btn:active{
transform:scale(.97);
}

/* ===== RESPONSIVE BREAKPOINT ===== */

@media (max-width:480px){

.profile-img{
width:100px;
height:100px;
}

.container{
max-width:100%;
padding:0 16px;   /* 👈 margen lateral real */
}

h2{
margin-bottom:30px;
}

.menu-btn{
padding:16px;
margin-bottom:14px;
}

}

/* ===== DESKTOP EXTRA SPACE ===== */

@media (min-width:900px){

.container{
max-width:360px;
}

}
</style>
</head>

<body>

<div class="container">

<img src="https://via.placeholder.com/150" class="profile-img">
<h2>Juan Zuluaga</h2>

<button class="menu-btn" onclick="goToTracker()">Tracker</button>
<button class="menu-btn">Estadísticas</button>
<button class="menu-btn">Configuración</button>

</div>

<script>
function goToTracker(){
window.location.href="tracker.html";
}
</script>

</body>
</html>
