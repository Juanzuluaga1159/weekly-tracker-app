<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#b91c1c">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Weekly Tracker</title>

<style>

:root{
--bg:#030303;
--border:rgba(255,255,255,0.09);
--text:#f5f5f5;
--muted:#a3a3a3;
--primary:#dc2626;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#030303;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
max-width:420px;
width:100%;
}

.menu{
display:flex;
flex-direction:column;
gap:16px;
}

.menu-btn{
padding:18px;
border-radius:18px;
border:1px solid var(--border);
background:rgba(255,255,255,.04);
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.menu-btn:hover{
border-color:#dc2626;
}

.title{
text-align:center;
font-size:28px;
font-weight:800;
margin-bottom:30px;
text-shadow:0 0 20px rgba(220,38,38,.3);
}

</style>
</head>

<body>

<div class="container">

<div class="title">
Weekly Tracker
</div>

<div class="menu">

<button class="menu-btn" onclick="goToTracker()">
Tracker
<span>›</span>
</button>

<button class="menu-btn" onclick="goToCalendar()">
Planner semanal
<span>›</span>
</button>

<button class="menu-btn">
Estadísticas
<span>›</span>
</button>

<button class="menu-btn">
Configuración
<span>›</span>
</button>

</div>

</div>

<script>

function goToTracker(){
window.location.href="tracker.html"
}

function goToCalendar(){
window.location.href="calendar.html"
}

</script>

</body>
</html>
