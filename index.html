<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Principal</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
background:linear-gradient(160deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:100%;
max-width:400px;
text-align:center;
}

.profile-img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:3px solid rgba(255,255,255,.2);
}

h2{
margin-bottom:40px;
font-weight:500;
}

.menu-btn{
width:100%;
padding:18px;
margin-bottom:20px;
border:none;
border-radius:16px;
background:rgba(255,255,255,0.08);
color:white;
font-size:16px;
cursor:pointer;
transition:.2s;
}

.menu-btn:hover{
background:rgba(255,255,255,0.15);
}

.menu-btn:active{
transform:scale(.97);
}
</style>
</head>

<body>

<div class="container">

<img src="https://via.placeholder.com/150" class="profile-img">
<h2>Juan Zuluaga</h2>

<button class="menu-btn" onclick="goToTracker()">Tracker</button>
<button class="menu-btn">Estadísticas</button>
<button class="menu-btn">Configuración</button>

</div>

<script>
function goToTracker(){
window.location.href="tracker.html";
}
</script>

</body>
</html>
