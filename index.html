<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#b91c1c">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Weekly Tracker</title>

<style>
:root{
--bg:#030303;
--bg-soft:#0b0b0b;
--card:rgba(255,255,255,0.04);
--border:rgba(255,255,255,0.09);
--text:#f5f5f5;
--muted:#a3a3a3;
--primary:#dc2626;
--primary-2:#991b1b;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

html,body{
width:100%;
min-height:100%;
background:var(--bg);
color:var(--text);
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:22px 16px;
padding-top:calc(22px + env(safe-area-inset-top));
padding-bottom:calc(22px + env(safe-area-inset-bottom));
position:relative;
overflow:hidden;
}

/* glow background */

body::before{
content:"";
position:fixed;
top:-120px;
left:-120px;
width:320px;
height:320px;
background:var(--primary);
opacity:.14;
filter:blur(130px);
pointer-events:none;
}

body::after{
content:"";
position:fixed;
right:-130px;
bottom:-150px;
width:340px;
height:340px;
background:#7f1d1d;
opacity:.16;
filter:blur(140px);
pointer-events:none;
}

.container{
position:relative;
z-index:1;
width:100%;
max-width:420px;
margin:0 auto;
}

/* top */

.profile-card{
background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.03));
border:1px solid var(--border);
border-radius:28px;
padding:28px 22px 24px;
text-align:center;
backdrop-filter:blur(18px);
box-shadow:
0 18px 40px rgba(0,0,0,.45),
0 0 0 1px rgba(255,255,255,.02) inset;
margin-bottom:18px;
}

.avatar-wrap{
position:relative;
width:118px;
height:118px;
margin:0 auto 18px;
}

.avatar-wrap::before{
content:"";
position:absolute;
inset:-10px;
border-radius:50%;
background:radial-gradient(circle,rgba(220,38,38,.28),transparent 65%);
filter:blur(6px);
}

.profile-img,
.avatar-placeholder{
position:relative;
width:118px;
height:118px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(220,38,38,.45);
box-shadow:
0 0 0 4px rgba(220,38,38,.08),
0 0 30px rgba(220,38,38,.22);
}

.avatar-placeholder{
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(180deg,#161616,#0b0b0b);
font-size:38px;
font-weight:800;
color:white;
}

.user-name{
font-size:24px;
font-weight:800;
letter-spacing:.3px;
margin-bottom:6px;
text-shadow:0 0 16px rgba(220,38,38,.18);
}

.user-subtitle{
font-size:13px;
color:var(--muted);
line-height:1.45;
}

/* menu */

.menu{
display:flex;
flex-direction:column;
gap:14px;
}

.menu-btn{
position:relative;
width:100%;
padding:18px 18px;
border:none;
border-radius:22px;
background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.03));
border:1px solid var(--border);
color:white;
cursor:pointer;
transition:.22s;
backdrop-filter:blur(16px);
display:flex;
align-items:center;
justify-content:space-between;
gap:14px;
box-shadow:
0 14px 34px rgba(0,0,0,.35),
0 0 0 1px rgba(255,255,255,.02) inset;
}

.menu-btn:hover{
transform:translateY(-2px);
}

.menu-btn:active{
transform:scale(.98);
}

.menu-btn.primary{
border-color:rgba(220,38,38,.28);
box-shadow:
0 16px 36px rgba(0,0,0,.38),
0 0 24px rgba(220,38,38,.12);
}

.menu-btn.secondary{
border-color:rgba(255,255,255,.09);
}

.menu-btn.tertiary{
border-color:rgba(255,255,255,.09);
}

.menu-btn-left{
display:flex;
align-items:center;
gap:14px;
text-align:left;
}

.icon-box{
width:48px;
height:48px;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(220,38,38,.10);
border:1px solid rgba(220,38,38,.18);
box-shadow:0 0 16px rgba(220,38,38,.12);
font-size:22px;
flex-shrink:0;
}

.menu-btn.secondary .icon-box,
.menu-btn.tertiary .icon-box{
background:rgba(255,255,255,.04);
border-color:rgba(255,255,255,.08);
box-shadow:none;
}

.menu-text{
display:flex;
flex-direction:column;
gap:3px;
}

.menu-title{
font-size:17px;
font-weight:800;
letter-spacing:.2px;
}

.menu-subtitle{
font-size:12px;
color:var(--muted);
font-weight:500;
}

.arrow{
font-size:18px;
color:#d4d4d4;
opacity:.9;
}

/* footer */

.footer-note{
margin-top:16px;
text-align:center;
font-size:12px;
color:#8a8a8a;
line-height:1.45;
}

/* responsive */

@media (max-width:480px){
.profile-card{
padding:24px 18px 20px;
border-radius:24px;
}

.avatar-wrap,
.profile-img,
.avatar-placeholder{
width:104px;
height:104px;
}

.user-name{
font-size:22px;
}

.menu-btn{
padding:16px;
border-radius:20px;
}

.icon-box{
width:44px;
height:44px;
border-radius:14px;
font-size:20px;
}

.menu-title{
font-size:16px;
}

.menu-subtitle{
font-size:11px;
}
}
</style>
</head>

<body>

<div class="container">

  <div class="profile-card">
    <div class="avatar-wrap">
      <!-- Si después querés usar una foto, reemplazá este div por un img -->
      <div class="avatar-placeholder">J</div>
      <!-- ejemplo:
      <img src="tu-foto.jpg" class="profile-img" alt="Perfil">
      -->
    </div>

    <div class="user-name">Juan Zuluaga</div>
    <div class="user-subtitle">Tu espacio personal para organizar hábitos, seguir progreso y mantener consistencia.</div>
  </div>

  <div class="menu">
    <button class="menu-btn primary" onclick="goToTracker()">
      <div class="menu-btn-left">
        <div class="icon-box">📋</div>
        <div class="menu-text">
          <div class="menu-title">Tracker</div>
          <div class="menu-subtitle">Crear, organizar y completar tareas</div>
        </div>
      </div>
      <div class="arrow">›</div>
    </button>

    <button class="menu-btn secondary">
      <div class="menu-btn-left">
        <div class="icon-box">📊</div>
        <div class="menu-text">
          <div class="menu-title">Estadísticas</div>
          <div class="menu-subtitle">Visualizar tu progreso semanal</div>
        </div>
      </div>
      <div class="arrow">›</div>
    </button>

    <button class="menu-btn tertiary">
      <div class="menu-btn-left">
        <div class="icon-box">⚙️</div>
        <div class="menu-text">
          <div class="menu-title">Configuración</div>
          <div class="menu-subtitle">Ajustar preferencias de la app</div>
        </div>
      </div>
      <div class="arrow">›</div>
    </button>
  </div>

  

</div>

<script>
function goToTracker(){
  window.location.href = "tracker.html";
}
</script>

</body>
</html>
